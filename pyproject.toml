[tool.ruff]
target-version = "py310"
line-length = 110
src = ["ugv_swarm_expert"]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "C4",
    "SIM",
]
ignore = [
    "E501",
    "B008",
]

[tool.ruff.lint.per-file-ignores]
"test/*" = ["S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
